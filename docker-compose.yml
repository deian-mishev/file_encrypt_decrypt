version: '3'

services:
  webserver:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    restart: always
    volumes:
      - ./nginx/conf/:/etc/nginx/conf.d/:ro
      - ./certbot/www:/var/www/certbot/:ro
      - ./certbot/conf/:/etc/nginx/ssl/:ro
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www/:/var/www/certbot/:rw
      - ./certbot/conf/:/etc/letsencrypt/:rw
  encrypto:
    image: 864685453410.dkr.ecr.us-east-1.amazonaws.com/encrypto_repository:latest
    ports:
      - 8080:8080
    depends_on:
      redis:
        condition: service_started
  redis:
    image: redis:latest
    ports:
      - 6379:6379